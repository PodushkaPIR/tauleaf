<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>tauleaf</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Files</h2>
            </div>
            <ul id="file-list"></ul>
        </aside>
        <main id="main">
            <div id="editor-panel">
                <div class="panel-header">
                    <span id="current-file">-</span>
                </div>
                <div id="editor-container">
                    <pre id="editor"></pre>
                </div>
            </div>
            <div id="pdf-panel">
                <div class="panel-header">
                    <span>PDF</span>
                    <button id="recompile-btn">Recompile</button>
                </div>
                <div id="pdf-container">
                    <iframe id="pdf-viewer"></iframe>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
