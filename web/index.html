<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>tauleaf</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="/js/editor.bundle.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="login-screen" class="hidden">
        <div class="login-box">
            <h1>tauleaf</h1>
            <p>Enter access code to continue</p>
            <input type="text" id="access-code" placeholder="Access code" />
            <button id="login-btn">Login</button>
            <p id="login-error" class="error hidden"></p>
        </div>
    </div>

    <div id="admin-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Admin Panel</h2>
                <button id="close-admin" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="info-row">
                    <label>Current Access Code:</label>
                    <span id="admin-code">-</span>
                </div>
                <div class="info-row">
                    <label>Created:</label>
                    <span id="admin-created">-</span>
                </div>
                <button id="regenerate-btn" class="danger-btn">Generate New Code</button>
                <p id="admin-message" class="info hidden"></p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Files</h2>
                <div>
                    <button id="file-btn" class="small-btn fa fa-file-circle-plus" title="New file"></button>
                    <button id="folder-btn" class="small-btn fa fa-folder-plus" title="New folder"></button>
                    <button id="upload-btn" class="small-btn fa fa-upload" title="Upload files"></button>
                    <button id="admin-btn" class="small-btn fa fa-cog">Admin</button>
                </div>
            </div>
            <ul id="file-list"></ul>
            <input type="file" id="file-input" accept=".tex" multiple class="hidden" />
        </aside>
        <main id="main">
            <div id="editor-panel">
                <div class="panel-header">
                    <span id="current-file">-</span>
                    <button id="save-btn" class="small-btn">Save</button>
                </div>
                <div id="editor-container">
                    <div id="editor"></div>
                    <textarea id="editor-fallback" class="hidden"></textarea>
                </div>
            </div>
            <div id="pdf-panel">
                <div class="panel-header">
                    <span>PDF</span>
                    <div>
                        <button id="logout-btn" class="small-btn fa fa-sign-out-alt">Logout</button>
                        <button id="recompile-btn">Recompile</button>
                    </div>
                </div>
                <div id="pdf-container">
                    <iframe id="pdf-viewer"></iframe>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
