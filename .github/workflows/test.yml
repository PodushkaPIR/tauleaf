name: Test & Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          
      - name: Build
        run: go build -o tauleaf ./cmd/tauleaf
        
      - name: Build editor
        run: |
          npm install
          node build-editor.js
          
      - name: Start server test
        run: |
          timeout 5 ./tauleaf -project ./test-project -addr 8080 || true
